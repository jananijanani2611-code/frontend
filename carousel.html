<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to right, #190133, #6f1977, rgb(228, 170, 214),pink);
    font-family: 'Georgia', serif;
}

.slider_container {
    background: #38142a;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 30px gold;
    text-align: center;
    width: 500px;
}

#slider {
    width: 100%;
    height: 320px;
    border-radius: 10px;
    border: 4px solid gold;
    transition: 0.5s ease;
}

#slider:hover {
    transform: scale(1.03);
}

button {
    margin: 20px 10px 0 10px;
    padding: 10px 25px;
    background: rgb(251, 251, 250);
    color: black;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e4c3f4;
    transform: translateY(-3px);
}

</style>
</head>

<body>

<div class="slider_container">
    <img id="slider" src="" alt="bannerimages">
    <div>
        <button onclick="previousPic()">Previous</button>
        <button onclick="nextPic()">Next</button>
    </div>
</div>

<script>
let imagecount = 0;

let images = [
"https://img.freepik.com/premium-photo/diamond-ear-ring-necklace-jewellery_510951-8.jpg?semt=ais_rp_progressive&w=740&q=80",
"https://img.freepik.com/premium-photo/ladies-jewellery-necklace-picture-realistic_1270398-3621.jpg?semt=ais_rp_progressive&w=740&q=80",
"https://www.manyavar.com/dw/image/v2/BJZV_PRD/on/demandware.static/-/Library-Sites-ManyavarSharedLibrary/default/dw3253c2aa/Trending%20Designs%20in%20Gold%20for%20Your%20Wedding%20Jewellery%20Ranging%20from%20Mangtika%20to%20Payal_Blog%201.jpg",
"https://static.vecteezy.com/system/resources/thumbnails/023/140/237/small/fashionable-premium-designer-ring-jewelry-banner-ai-generated-photo.jpg"
];

document.getElementById("slider").src = images[imagecount];

function nextPic() {
    if (imagecount < images.length - 1) {
        imagecount++;
    } else {
        imagecount = 0;
    }
    document.getElementById("slider").src = images[imagecount];
}

function previousPic() {
    if (imagecount > 0) {
        imagecount--;
    } else {
        imagecount = images.length - 1;
    }
    document.getElementById("slider").src = images[imagecount];
}
</script>

</body>
</html>
